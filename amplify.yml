version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - echo "S3_REGION=$S3_REGION" > .env.production.local
        - echo "S3_BUCKET=$S3_BUCKET" >> .env.production.local
        - echo "S3_ACCESS_KEY_ID=$S3_ACCESS_KEY_ID" >> .env.production.local
        - echo "S3_SECRET_ACCESS_KEY=$S3_SECRET_ACCESS_KEY" >> .env.production.local
        - echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" >> .env.production.local
        - echo "DATABASE_URL=$DATABASE_URL" >> .env.production.local
        - test -n "$S3_REGION" && echo "[env-check] S3_REGION is SET" || echo "[env-check] S3_REGION is EMPTY"
    build:
      commands:
        - npm run build
        - cp .env.production.local .next/standalone/.env.production.local
        - cp -r .next/static .next/standalone/.next/static
        - cp -r public .next/standalone/public
  artifacts:
    baseDirectory: .next/standalone
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
