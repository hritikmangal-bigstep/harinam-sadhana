version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - node -e "const e=process.env,fs=require('fs');fs.writeFileSync('src/lib/build-env.ts','// Generated by Amplify preBuild — do not commit real values.\nexport const buildEnv = '+JSON.stringify({S3_REGION:e.S3_REGION||'',S3_BUCKET:e.S3_BUCKET||'',S3_ACCESS_KEY_ID:e.S3_ACCESS_KEY_ID||'',S3_SECRET_ACCESS_KEY:e.S3_SECRET_ACCESS_KEY||''})+' as const;\n')"
        - test -n "$S3_REGION" && echo "[env-check] S3_REGION is SET" || echo "[env-check] S3_REGION is EMPTY"
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
