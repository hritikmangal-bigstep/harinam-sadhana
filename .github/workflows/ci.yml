name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  ci:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Dummy values — build does not need real credentials, only runtime does
          S3_REGION: ap-south-1
          S3_BUCKET: placeholder
          S3_ACCESS_KEY_ID: placeholder
          S3_SECRET_ACCESS_KEY: placeholder

  amplify:
    name: Amplify Deploy Status
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Wait for Amplify build to complete
        id: amplify
        run: |
          APP_ID=${{ secrets.AMPLIFY_APP_ID }}
          BRANCH="${{ github.ref_name }}"

          echo "Waiting for Amplify build on branch: $BRANCH"

          # Poll until no RUNNING/PENDING jobs remain (max 10 min)
          for i in $(seq 1 20); do
            STATUS=$(aws amplify list-jobs \
              --app-id "$APP_ID" \
              --branch-name "$BRANCH" \
              --max-results 1 \
              --query 'jobSummaries[0].status' \
              --output text 2>/dev/null || echo "UNKNOWN")

            echo "[$i/20] Amplify build status: $STATUS"

            if [ "$STATUS" = "SUCCEED" ]; then
              echo "status=success" >> $GITHUB_OUTPUT
              echo "✅ Amplify deploy succeeded"
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "status=failed" >> $GITHUB_OUTPUT
              echo "❌ Amplify deploy failed with status: $STATUS"
              exit 1
            fi

            sleep 30
          done

          echo "⚠️ Timed out waiting for Amplify build"
          exit 1
